site_name: Using OpenVox
site_description: A self-paced introduction to configuration management with OpenVox
# TODO: update these once the repo is re-homed to voxpupuli/OpenVoxProject
site_url: https://sicuraus.github.io/using-openvox/
repo_url: https://github.com/sicuraus/using-openvox
repo_name: sicuraus/using-openvox
edit_uri: edit/main/docs/
copyright: >
  Copyright 2018 Onyx Point, Inc. — Copyright 2026 Sicura, Inc.
  Licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/">CC BY-SA 4.0</a>.

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - toc.follow
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Puppet Overview: overview.md
  - Installing OpenVox: install.md
  - The Ecosystem: ecosystem.md
  - Using the CLI: cli.md
  - Module Structure: module-structure.md
  - Core Resources: resources.md
  - The Puppet Language: puppet-language.md
  - Logic, Facts, and Hiera: hiera.md
  - Hands-On Exercises: hands-on.md
  - Where to Go Next: next-steps.md
