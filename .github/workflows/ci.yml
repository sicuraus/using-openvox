name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - run: pip install -r requirements.txt
      - run: mkdocs build --strict
